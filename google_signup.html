<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงชื่อเข้าใช้งานด้วย Google</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Athiti:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', 'Athiti', sans-serif;
      background-color: #f0f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .google-card {
      background: #ffffff;
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      border: 1px solid #e3e3e3;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
      min-height: 380px;
      justify-content: center;
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      margin-bottom: 8px;
    }
    .google-logo {
      width: 40px;
      height: 40px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: #1f1f1f;
    }
    p.subtitle {
      font-size: 0.95rem;
      color: #444746;
      font-weight: 500;
    }
    .accounts-list {
      display: flex;
      flex-direction: column;
      border: 1px solid #c4c7c5;
      border-radius: 12px;
      overflow: hidden;
    }
    .account-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #c4c7c5;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .account-row:last-child {
      border-bottom: none;
    }
    .account-row:hover {
      background-color: #f8fafd;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #3e6b53;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .account-info {
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #1f1f1f;
    }
    .email {
      font-size: 0.85rem;
      color: #444746;
    }
    .icon-plus {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px dashed #c4c7c5;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #444746;
    }
    .custom-form {
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
      width: 100%;
    }
    .custom-form.active {
      display: flex;
    }
    .input-field {
      width: 100%;
      font-family: inherit;
      padding: 12px 16px;
      border: 1px solid #c4c7c5;
      border-radius: 8px;
      outline: none;
      font-size: 0.95rem;
      color: #1f1f1f;
    }
    .input-field:focus {
      border-color: #0b57d0;
      box-shadow: 0 0 0 2px rgba(11, 87, 208, 0.15);
    }
    .btn-submit {
      background-color: #0b57d0;
      color: #ffffff;
      border: none;
      border-radius: 100px;
      padding: 12px 24px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
      align-self: flex-end;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background-color: #0842a0;
    }
    .error-msg {
      color: #b3261e;
      font-size: 0.85rem;
      font-weight: 600;
      min-height: 18px;
    }
    .footer-text {
      font-size: 0.8rem;
      color: #444746;
      line-height: 1.4;
      margin-top: 10px;
    }
    .loader-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #0b57d0;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="google-card">
    
    <!-- Google Authentication Spinner View (Initially Active) -->
    <div id="loader-view" class="loader-overlay">
      <div class="spinner"></div>
      <h1 id="loader-title" style="margin-top: 10px;">กำลังตรวจหาบัญชี Google...</h1>
      <p class="subtitle" id="connecting-subtitle">กำลังค้นหาบัญชีที่ลงชื่อเข้าใช้งานบนอุปกรณ์นี้</p>
    </div>

    <!-- Account Selector View (Initially Hidden) -->
    <div id="selector-view" style="display: none; flex-direction: column; gap: 20px; width: 100%;">
      <div class="header">
        <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        <h1 id="header-title">เลือกบัญชี</h1>
        <p class="subtitle" id="header-subtitle">เพื่อดำเนินการต่อยัง Pick&PicTrash</p>
      </div>

      <div class="accounts-list" id="accounts-container">
        <!-- Rendered dynamically by Javascript -->
      </div>

      <!-- Add Custom Account Form -->
      <div class="custom-form" id="custom-account-form">
        <input type="text" id="custom-name" placeholder="ชื่อสกุล" class="input-field">
        <input type="email" id="custom-email" placeholder="อีเมล (เช่น name@gmail.com)" class="input-field">
        <div class="error-msg" id="form-error"></div>
        <button class="btn-submit" onclick="submitCustomAccount()">ถัดไป</button>
      </div>

      <p class="footer-text">
        ก่อนที่จะใช้งาน Pick&PicTrash บัญชี Google ของคุณจะได้รับการแชร์ข้อมูล ชื่อ ที่อยู่อีเมล และรูปโปรไฟล์ เพื่อลงทะเบียนสมาชิกในทันที
      </p>
    </div>

  </div>

  <script>
    // Safe safeLocalStorage wrapper / polyfill
    window.safeLocalStorage = (function() {
      var storage;
      try {
        storage = window.localStorage;
        var x = '__storage_test__';
        storage.setItem(x, x);
        storage.removeItem(x);
      } catch(e) {
        storage = null;
      }
      
      if (storage) {
        return storage;
      } else {
        console.warn("safeLocalStorage is not available. Using in-memory fallback.");
        var mem = {};
        return {
          getItem: function(k) { return mem.hasOwnProperty(k) ? mem[k] : null; },
          setItem: function(k, v) { mem[k] = String(v); },
          removeItem: function(k) { delete mem[k]; },
          clear: function() { mem = {}; }
        };
      }
    })();

    // Colors for avatar backgrounds
    const AVATAR_COLORS = ['#3e6b53', '#0284c7', '#ea580c', '#64748b', '#7c3aed', '#db2777'];

    document.addEventListener("DOMContentLoaded", () => {
      // Simulate Google account search
      setTimeout(() => {
        detectAccounts();
      }, 1500);
    });

    function detectAccounts() {
      // Fetch accounts DB from safeLocalStorage
      let accounts = [];
      try {
        accounts = JSON.parse(safeLocalStorage.getItem('eco_accounts') || '[]');
      } catch(e) {
        accounts = [];
      }

      const loaderView = document.getElementById('loader-view');
      const selectorView = document.getElementById('selector-view');
      const accountsContainer = document.getElementById('accounts-container');
      const headerTitle = document.getElementById('header-title');
      const headerSubtitle = document.getElementById('header-subtitle');

      loaderView.style.display = 'none';
      selectorView.style.display = 'flex';

      if (accounts.length === 0) {
        // No account found on device: show sign-in form immediately
        headerTitle.textContent = "ลงชื่อเข้าใช้งาน";
        headerSubtitle.textContent = "ไม่พบบัญชี Google บนอุปกรณ์นี้ กรุณาลงชื่อเข้าใช้";
        showCustomForm(true);
      } else {
        // Render only accounts logged in on this device
        accountsContainer.innerHTML = '';
        
        accounts.forEach((acc, index) => {
          const firstChar = acc.username ? acc.username.charAt(0) : 'G';
          const color = AVATAR_COLORS[index % AVATAR_COLORS.length];
          
          const btn = document.createElement('button');
          btn.className = 'account-row';
          btn.onclick = () => selectAccount(acc.username, acc.email);
          btn.innerHTML = `
            <div class="avatar" style="background-color: ${color}">${firstChar}</div>
            <div class="account-info">
              <span class="name">${acc.username}</span>
              <span class="email">${acc.email}</span>
            </div>
          `;
          accountsContainer.appendChild(btn);
        });

        // Add "Use another account" button
        const otherBtn = document.createElement('button');
        otherBtn.className = 'account-row';
        otherBtn.onclick = () => showCustomForm(false);
        otherBtn.innerHTML = `
          <div class="icon-plus">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </div>
          <div class="account-info">
            <span class="name" style="font-weight: 500; color: #444746;">ใช้บัญชีอื่น</span>
          </div>
        `;
        accountsContainer.appendChild(otherBtn);
      }
    }

    function selectAccount(name, email) {
      document.getElementById('selector-view').style.display = 'none';
      const loaderView = document.getElementById('loader-view');
      const loaderTitle = document.getElementById('loader-title');
      const connectingSubtitle = document.getElementById('connecting-subtitle');
      
      loaderTitle.textContent = "กำลังเชื่อมโยงกับ Pick&PicTrash...";
      connectingSubtitle.textContent = `กำลังเข้าสู่ระบบด้วยบัญชี ${email}`;
      loaderView.style.display = 'flex';
      
      saveAndRedirect(name, email);
    }

    function showCustomForm(forceShow = false) {
      const form = document.getElementById('custom-account-form');
      if (forceShow) {
        form.classList.add('active');
        document.getElementById('custom-name').focus();
      } else {
        form.classList.toggle('active');
        if (form.classList.contains('active')) {
          document.getElementById('custom-name').focus();
        }
      }
    }

    function submitCustomAccount() {
      const name = document.getElementById('custom-name').value.trim();
      const email = document.getElementById('custom-email').value.trim();
      const errorDiv = document.getElementById('form-error');
      
      errorDiv.textContent = '';
      
      if (!name) {
        errorDiv.textContent = 'กรุณากรอกชื่อผู้ใช้งาน';
        return;
      }
      
      if (!email) {
        errorDiv.textContent = 'กรุณากรอกอีเมล';
        return;
      }
      
      // Real email validation regex
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        errorDiv.textContent = 'รูปแบบอีเมลไม่ถูกต้อง';
        return;
      }

      document.getElementById('selector-view').style.display = 'none';
      const loaderView = document.getElementById('loader-view');
      const loaderTitle = document.getElementById('loader-title');
      const connectingSubtitle = document.getElementById('connecting-subtitle');
      
      loaderTitle.textContent = "กำลังเชื่อมโยงกับ Pick&PicTrash...";
      connectingSubtitle.textContent = `กำลังลงทะเบียนเข้าสู่ระบบด้วยบัญชี ${email}`;
      loaderView.style.display = 'flex';
      
      saveAndRedirect(name, email);
    }

    function saveAndRedirect(name, email) {
      setTimeout(() => {
        // Fetch accounts DB
        let accounts = [];
        try {
          accounts = JSON.parse(safeLocalStorage.getItem('eco_accounts') || '[]');
        } catch(e) {
          accounts = [];
        }
        
        // Find if account already exists, else add
        let user = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
        if (!user) {
          user = {
            username: name,
            email: email,
            password: 'google_oauth_bypass',
            xp: 0,
            level: 1,
            badge: 'พลเมืองสะอาดกรุงเทพฯ',
            score: 0,
            scannedCount: 0
          };
          accounts.push(user);
          safeLocalStorage.setItem('eco_accounts', JSON.stringify(accounts));
        }
        
        // Set login state
        safeLocalStorage.setItem('eco_user_logged_in', 'true');
        safeLocalStorage.setItem('eco_user_profile', JSON.stringify(user));
        
        // Set dynamic stats cache for app.js
        const userStats = {
          username: user.username,
          level: user.level,
          xp: user.xp,
          score: user.score,
          scannedCount: user.scannedCount,
          badge: `Lv. ${user.level} ${user.badge}`
        };
        safeLocalStorage.setItem("eco_ar_user_stats", JSON.stringify(userStats));
        
        // Redirect back to index.html
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>
</body>
</html>
